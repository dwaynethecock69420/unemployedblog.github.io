baseURL = "https://your-domain.example/"
locale = "en-AU"
title = "unemployed guy's blog"
theme = "PaperMod"

[params]
  defaultTheme = "dark"
  ShowReadingTime = true
  ShowCodeCopyButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowShareButtons = false
  ShowToc = true
  TocOpen = false
  mainSections = ["posts"]
  description = "IT student. Networking, security, Linux, and the occasional shader pack."

  [params.homeInfoParams]
    Title = "unemployed guy's blog"
    Content = "Currently I'm just an IT student testing with Claude AI. I'm not a programmer, but I have an idea of utilising AI and directing it to achieving certain goals. Currently I just run Claude on my VM (type 2) with Debian as the main OS for Claude, and pfSense as another VM to act as a secondary router and firewall, as a means of mitigating against prompt injection attacks."

[menu]
  [[menu.main]]
    name = "Posts"
    url = "/posts/"
    weight = 1
  [[menu.main]]
    name = "Tags"
    url = "/tags/"
    weight = 2
  [[menu.main]]
    name = "Archive"
    url = "/archives/"
    weight = 3
