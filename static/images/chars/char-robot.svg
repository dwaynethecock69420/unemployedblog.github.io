<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 88" fill="none">
  <!-- BATMAN (Arkham Knight) -->
  <!-- Left bat ear -->
  <rect x="13" y="0"  width="5"  height="13" fill="#1C1C2E"/>
  <rect x="10" y="7"  width="9"  height="9"  fill="#1C1C2E"/>
  <!-- Right bat ear -->
  <rect x="34" y="0"  width="5"  height="13" fill="#1C1C2E"/>
  <rect x="33" y="7"  width="9"  height="9"  fill="#1C1C2E"/>
  <!-- Cowl head -->
  <rect x="10" y="12" width="32" height="18" fill="#1C1C2E"/>
  <!-- White eye lenses -->
  <rect x="12" y="16" width="10" height="6"  fill="#E8E8FF"/>
  <rect x="30" y="16" width="10" height="6"  fill="#E8E8FF"/>
  <rect x="13" y="17" width="7"  height="3"  fill="white"/>
  <rect x="31" y="17" width="7"  height="3"  fill="white"/>
  <!-- Jaw / chin -->
  <rect x="14" y="26" width="24" height="5"  fill="#252535"/>
  <!-- Cape (full width, dark) -->
  <rect x="0"  y="32" width="52" height="44" fill="#0E0E1A"/>
  <rect x="3"  y="34" width="46" height="40" fill="#14141F"/>
  <!-- Shoulders over cape -->
  <rect x="8"  y="32" width="14" height="7"  fill="#222232"/>
  <rect x="30" y="32" width="14" height="7"  fill="#222232"/>
  <!-- Torso (over cape) -->
  <rect x="14" y="31" width="24" height="32" fill="#1C1C2E"/>
  <!-- Chest plate -->
  <rect x="17" y="34" width="18" height="8"  fill="#252535"/>
  <!-- BAT SYMBOL -->
  <!-- Center body -->
  <rect x="21" y="38" width="10" height="8"  fill="#F0C000"/>
  <!-- Head bumps -->
  <rect x="21" y="35" width="3"  height="4"  fill="#F0C000"/>
  <rect x="28" y="35" width="3"  height="4"  fill="#F0C000"/>
  <!-- Wings -->
  <rect x="14" y="40" width="8"  height="4"  fill="#F0C000"/>
  <rect x="30" y="40" width="8"  height="4"  fill="#F0C000"/>
  <!-- Wing outer tips -->
  <rect x="12" y="41" width="4"  height="3"  fill="#F0C000"/>
  <rect x="36" y="41" width="4"  height="3"  fill="#F0C000"/>
  <!-- Bat body notch -->
  <rect x="24" y="44" width="4"  height="3"  fill="#1C1C2E"/>
  <!-- Gold belt -->
  <rect x="14" y="62" width="24" height="4"  fill="#F0C000"/>
  <!-- Legs -->
  <rect x="14" y="66" width="10" height="22" fill="#1C1C2E"/>
  <rect x="28" y="66" width="10" height="22" fill="#1C1C2E"/>
  <!-- Boots -->
  <rect x="12" y="80" width="14" height="8"  fill="#0E0E1A"/>
  <rect x="26" y="80" width="14" height="8"  fill="#0E0E1A"/>
</svg>
