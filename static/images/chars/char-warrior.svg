<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 88" fill="none">
  <!-- STEVE (Minecraft) -->
  <!-- Hair top -->
  <rect x="10" y="0"  width="32" height="4"  fill="#5B3C21"/>
  <rect x="7"  y="4"  width="38" height="4"  fill="#5B3C21"/>
  <!-- Hair sides -->
  <rect x="7"  y="8"  width="4"  height="14" fill="#5B3C21"/>
  <rect x="41" y="8"  width="4"  height="14" fill="#5B3C21"/>
  <!-- Face skin -->
  <rect x="11" y="8"  width="30" height="14" fill="#C6956B"/>
  <!-- Eyes white -->
  <rect x="13" y="11" width="9"  height="6"  fill="white"/>
  <rect x="30" y="11" width="9"  height="6"  fill="white"/>
  <!-- Pupils (blue) -->
  <rect x="15" y="12" width="5"  height="4"  fill="#5577AA"/>
  <rect x="32" y="12" width="5"  height="4"  fill="#5577AA"/>
  <!-- Nose -->
  <rect x="22" y="15" width="8"  height="3"  fill="#A87050"/>
  <!-- Mouth corners -->
  <rect x="15" y="19" width="5"  height="2"  fill="#3D1F0D"/>
  <rect x="32" y="19" width="5"  height="2"  fill="#3D1F0D"/>
  <!-- Chin / jaw -->
  <rect x="11" y="21" width="30" height="3"  fill="#5B3C21"/>
  <!-- Shirt body (teal) -->
  <rect x="11" y="26" width="30" height="20" fill="#4BA3C3"/>
  <!-- Center seam -->
  <rect x="24" y="26" width="4"  height="20" fill="#3A8BAA"/>
  <!-- Left arm -->
  <rect x="1"  y="26" width="10" height="20" fill="#4BA3C3"/>
  <!-- Right arm -->
  <rect x="41" y="26" width="10" height="20" fill="#4BA3C3"/>
  <!-- Pants left leg -->
  <rect x="11" y="46" width="13" height="24" fill="#2B538A"/>
  <!-- Pants right leg -->
  <rect x="28" y="46" width="13" height="24" fill="#2B538A"/>
  <!-- Left boot -->
  <rect x="9"  y="62" width="17" height="10" fill="#3D2312"/>
  <!-- Right boot -->
  <rect x="26" y="62" width="17" height="10" fill="#3D2312"/>
