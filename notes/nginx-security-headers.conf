# Nginx security headers for self-hosted blog deployment
# Place these inside the `server {}` block in /etc/nginx/sites-available/blog

server {
    listen 443 ssl http2;
    server_name yourlocalunemployed.github.io;  # replace with your actual domain

    root /var/www/blog;
    index index.html;

    # ── TLS ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/<domain>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<domain>/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── Security headers ─────────────────────────────────────────────────────

    # Clickjacking — block embedding in iframes on other sites
    add_header X-Frame-Options "DENY" always;

    # Stops browsers guessing MIME types (e.g. serving a .txt as JS)
    add_header X-Content-Type-Options "nosniff" always;

    # Only send the origin (not the full URL) when following links off-site
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Disable browser features that a static blog has no need for
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

    # Force HTTPS for 1 year; include subdomains; preload-ready
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Content Security Policy — mirrors the meta-tag CSP in extend_head.html
    # frame-ancestors must live here (meta tags cannot set it)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';" always;

    # ── Static file serving ───────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Cache immutable assets (Hugo fingerprints CSS/JS filenames)
    location ~* \.(css|js|woff2|woff|ttf|ico|png|jpg|jpeg|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Repeat security headers — nginx doesn't inherit add_header into nested blocks
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name <your-domain>;
    return 301 https://$host$request_uri;
}
