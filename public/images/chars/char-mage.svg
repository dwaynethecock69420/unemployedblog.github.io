<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 88" fill="none">
  <!-- Hat tip -->
  <rect x="24" y="0" width="4" height="3" fill="#7020c0"/>
  <rect x="22" y="3" width="8" height="3" fill="#7828c8"/>
  <rect x="19" y="6" width="14" height="3" fill="#8030d0"/>
  <rect x="17" y="9" width="18" height="3" fill="#8838d8"/>
  <!-- Hat brim -->
  <rect x="11" y="12" width="30" height="5" rx="1" fill="#9040e0"/>
  <!-- Hat brim shadow -->
  <rect x="11" y="15" width="30" height="2" fill="#7030c0"/>
  <!-- Face -->
  <rect x="16" y="17" width="20" height="14" fill="#f0c890"/>
  <!-- Eyes (glowing purple) -->
  <rect x="18" y="20" width="6" height="5" fill="#1a0030"/>
  <rect x="28" y="20" width="6" height="5" fill="#1a0030"/>
  <rect x="19" y="21" width="4" height="3" fill="#cc44ff"/>
  <rect x="29" y="21" width="4" height="3" fill="#cc44ff"/>
  <rect x="20" y="21" width="2" height="2" fill="#ff88ff"/>
  <rect x="30" y="21" width="2" height="2" fill="#ff88ff"/>
  <!-- Nose/mouth -->
  <rect x="24" y="26" width="4" height="2" fill="#d0a870"/>
  <rect x="20" y="28" width="12" height="2" fill="#c09060"/>
  <!-- Beard wisps -->
  <rect x="20" y="31" width="12" height="2" fill="#f0e0d0"/>
  <rect x="22" y="33" width="8" height="2" fill="#e8d8c8"/>
  <!-- Robe body (wide, flowing) -->
  <rect x="8" y="31" width="36" height="32" fill="#5020a0"/>
  <!-- Robe side flares -->
  <rect x="5" y="36" width="5" height="22" fill="#4818a0"/>
  <rect x="42" y="36" width="5" height="22" fill="#4818a0"/>
  <!-- Centre robe stripe -->
  <rect x="24" y="31" width="4" height="32" fill="#6028b0"/>
  <!-- Gold sash/belt -->
  <rect x="8" y="44" width="36" height="4" fill="#f3f901"/>
  <!-- Robe star pattern -->
  <rect x="14" y="35" width="3" height="3" fill="#8040c0"/>
  <rect x="35" y="38" width="3" height="3" fill="#8040c0"/>
  <rect x="14" y="49" width="3" height="3" fill="#8040c0"/>
  <rect x="35" y="52" width="3" height="3" fill="#8040c0"/>
  <!-- Sleeves -->
  <rect x="4" y="31" width="6" height="26" fill="#5020a0"/>
  <rect x="42" y="31" width="6" height="26" fill="#5020a0"/>
  <!-- Hands -->
  <rect x="2" y="55" width="8" height="6" rx="1" fill="#f0c890"/>
  <rect x="42" y="55" width="8" height="6" rx="1" fill="#f0c890"/>
  <!-- Staff (right side, tall) -->
  <rect x="47" y="12" width="4" height="48" fill="#7a5030"/>
  <!-- Staff orb -->
  <rect x="44" y="4" width="10" height="10" rx="2" fill="#9040d8"/>
  <rect x="46" y="5" width="6" height="8" rx="1" fill="#b050f0"/>
  <rect x="47" y="6" width="4" height="6" fill="#cc60ff"/>
  <rect x="48" y="7" width="2" height="4" fill="#ffffff"/>
  <!-- Magic sparkles from orb -->
  <rect x="42" y="2" width="2" height="2" fill="#f3f901" opacity="0.9"/>
  <rect x="50" y="0" width="2" height="2" fill="#cc44ff" opacity="0.8"/>
  <rect x="40" y="7" width="2" height="2" fill="#cc44ff" opacity="0.7"/>
  <!-- Robe bottom fringe -->
  <rect x="8" y="63" width="36" height="3" fill="#4010a0"/>
  <rect x="10" y="66" width="4" height="5" fill="#3808a0"/>
  <rect x="18" y="66" width="4" height="7" fill="#3808a0"/>
  <rect x="26" y="66" width="4" height="5" fill="#3808a0"/>
  <rect x="34" y="66" width="4" height="7" fill="#3808a0"/>
</svg>
