<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 88" fill="none">
  <!-- EXCALIBUR UMBRA (Warframe) -->
  <!-- Helmet point (gold) -->
  <rect x="23" y="0"  width="6"  height="5"  fill="#C9A227"/>
  <!-- Helmet main body -->
  <rect x="16" y="5"  width="20" height="16" fill="#0E0F1A"/>
  <!-- Gold top trim -->
  <rect x="14" y="5"  width="24" height="3"  fill="#C9A227"/>
  <!-- Helmet side fins -->
  <rect x="11" y="8"  width="6"  height="12" fill="#0E0F1A"/>
  <rect x="35" y="8"  width="6"  height="12" fill="#0E0F1A"/>
  <!-- Visor dark -->
  <rect x="16" y="10" width="20" height="8"  fill="#0A0A14"/>
  <!-- Glowing amber eyes -->
  <rect x="17" y="12" width="6"  height="4"  fill="#FFD700"/>
  <rect x="29" y="12" width="6"  height="4"  fill="#FFD700"/>
  <!-- Chin guard -->
  <rect x="19" y="20" width="14" height="4"  fill="#0E0F1A"/>
  <rect x="19" y="22" width="14" height="2"  fill="#C9A227"/>
  <!-- Shoulder armor -->
  <rect x="4"  y="25" width="14" height="7"  fill="#0E0F1A"/>
  <rect x="34" y="25" width="14" height="7"  fill="#0E0F1A"/>
  <rect x="4"  y="25" width="14" height="2"  fill="#C9A227"/>
  <rect x="34" y="25" width="14" height="2"  fill="#C9A227"/>
  <!-- Upper arms (slender) -->
  <rect x="6"  y="32" width="8"  height="22" fill="#0E0F1A"/>
  <rect x="38" y="32" width="8"  height="22" fill="#0E0F1A"/>
  <!-- Arm gold band -->
  <rect x="6"  y="42" width="8"  height="2"  fill="#C9A227"/>
  <rect x="38" y="42" width="8"  height="2"  fill="#C9A227"/>
  <!-- Torso (narrow) -->
  <rect x="17" y="25" width="18" height="32" fill="#0E0F1A"/>
  <!-- Torso chest cross -->
  <rect x="19" y="34" width="14" height="3"  fill="#C9A227" opacity="0.6"/>
  <rect x="24" y="27" width="4"  height="28" fill="#C9A227" opacity="0.25"/>
  <!-- White scarf/cloth left -->
  <rect x="9"  y="30" width="9"  height="36" fill="#DDD9D0"/>
  <rect x="7"  y="42" width="6"  height="24" fill="#C8C4BB"/>
  <!-- White scarf/cloth right -->
  <rect x="34" y="30" width="9"  height="36" fill="#DDD9D0"/>
  <rect x="39" y="42" width="6"  height="24" fill="#C8C4BB"/>
  <!-- Legs (slender) -->
  <rect x="18" y="57" width="7"  height="24" fill="#0E0F1A"/>
  <rect x="27" y="57" width="7"  height="24" fill="#0E0F1A"/>
  <!-- Knee guards -->
  <rect x="16" y="65" width="9"  height="3"  fill="#C9A227"/>
  <rect x="27" y="65" width="9"  height="3"  fill="#C9A227"/>
  <!-- Gold boots -->
  <rect x="15" y="78" width="11" height="6"  fill="#C9A227"/>
  <rect x="26" y="78" width="11" height="6"  fill="#C9A227"/>
</svg>
