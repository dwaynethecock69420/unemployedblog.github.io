<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 58 88" fill="none">
  <!-- DOOM SLAYER (Doom: The Dark Ages) -->
  <!-- Helmet (heavy, angular) -->
  <rect x="13" y="0"  width="32" height="22" fill="#1A2E10"/>
  <rect x="15" y="0"  width="28" height="4"  fill="#243818"/>
  <rect x="14" y="4"  width="30" height="14" fill="#162208"/>
  <!-- RED VISOR (T-shape, iconic) -->
  <rect x="16" y="10" width="26" height="7"  fill="#CC0000"/>
  <rect x="17" y="11" width="24" height="5"  fill="#FF2020"/>
  <!-- T-shape vertical top -->
  <rect x="27" y="5"  width="4"  height="7"  fill="#CC0000"/>
  <!-- Helmet chin -->
  <rect x="17" y="20" width="24" height="6"  fill="#1A2E10"/>
  <rect x="19" y="23" width="20" height="4"  fill="#243818"/>
  <!-- Helmet sides -->
  <rect x="9"  y="3"  width="6"  height="18" fill="#1A2E10"/>
  <rect x="43" y="3"  width="6"  height="18" fill="#1A2E10"/>
  <!-- MASSIVE SHOULDERS -->
  <rect x="0"  y="26" width="18" height="13" fill="#1A2E10"/>
  <rect x="40" y="26" width="18" height="13" fill="#1A2E10"/>
  <rect x="0"  y="26" width="18" height="4"  fill="#2A4220"/>
  <rect x="40" y="26" width="18" height="4"  fill="#2A4220"/>
  <rect x="3"  y="29" width="12" height="7"  fill="#243818"/>
  <rect x="43" y="29" width="12" height="7"  fill="#243818"/>
  <!-- Upper arms -->
  <rect x="2"  y="39" width="12" height="15" fill="#1A2E10"/>
  <rect x="44" y="39" width="12" height="15" fill="#1A2E10"/>
  <rect x="2"  y="46" width="12" height="3"  fill="#2A4220"/>
  <rect x="44" y="46" width="12" height="3"  fill="#2A4220"/>
  <!-- Gauntlets -->
  <rect x="2"  y="54" width="12" height="10" fill="#162208"/>
  <rect x="44" y="54" width="12" height="10" fill="#162208"/>
  <!-- Torso (wide) -->
  <rect x="16" y="28" width="26" height="32" fill="#1A2E10"/>
  <!-- Chest plate -->
  <rect x="19" y="31" width="20" height="12" fill="#243818"/>
  <rect x="21" y="33" width="16" height="3"  fill="#2A4220"/>
  <rect x="21" y="38" width="16" height="3"  fill="#2A4220"/>
  <!-- Centre split -->
  <rect x="28" y="28" width="2"  height="32" fill="#162208"/>
  <!-- Belt -->
  <rect x="16" y="58" width="26" height="4"  fill="#2A4220"/>
  <!-- Legs (armored) -->
  <rect x="16" y="62" width="11" height="22" fill="#1A2E10"/>
  <rect x="31" y="62" width="11" height="22" fill="#1A2E10"/>
  <!-- Knee guards -->
  <rect x="14" y="70" width="15" height="4"  fill="#2A4220"/>
  <rect x="29" y="70" width="15" height="4"  fill="#2A4220"/>
  <!-- Boots -->
  <rect x="13" y="78" width="16" height="8"  fill="#0F1A08"/>
  <rect x="29" y="78" width="16" height="8"  fill="#0F1A08"/>
</svg>
